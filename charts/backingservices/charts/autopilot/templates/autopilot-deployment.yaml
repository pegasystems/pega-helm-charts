{{- $depName := printf "%s" (include "deploymentName" (dict "root" .Values "defaultname" "autopilot" )) }}
{{- if .Values.enabled }}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ $depName }}
  labels:
    app: {{ $depName }}
    {{- if and (.Values.deployment) (.Values.deployment.labels) }}
    {{ toYaml .Values.deployment.labels | nindent 4 }}
    {{- end }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ $depName }}
  template:
    metadata:
      labels:
        app: {{ $depName }}
        {{- if .Values.podLabels }}
        {{ toYaml .Values.podLabels | nindent 8 }}
        {{- end }}
      {{- if .Values.podAnnotations }}
      annotations:
        {{ toYaml .Values.podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccountName }}
      serviceAccountName: {{ .Values.serviceAccountName }}
      {{- end }}
      imagePullSecrets:
      - name: {{ include "backingservicesRegistrySecret" ( dict "root" .Values "defaultname" "autopilot" ) }}
      {{- if .Values.docker.imagePullSecretNames }}
      {{- range .Values.docker.imagePullSecretNames }}
      - name: {{ . }}
      {{- end }}
      {{- end }}
      {{- if or (include "autopilot.hasCustomModels" .) .Values.vertex.applicationCredentialsFile }}
      volumes:
      {{- if (include "autopilot.hasCustomModels" .) }}
      - name: custom-models
        configMap:
          name: {{ include "autopilot.modelsConfigMapName" . }}
      {{- end }}
      {{- if .Values.vertex.applicationCredentialsFile }}
      - name: gcp-credentials
        secret:
          secretName: {{ include "autopilot.credentialsSecretName" . }}
          items:
          - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
            path: gcp-sa-key.json
      {{- end }}
      {{- end }}
      containers:
      - name: autopilot
        image: {{ .Values.docker.autopilot.image }}
        imagePullPolicy: {{ .Values.docker.autopilot.imagePullPolicy }}
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        resources:
          {{- if .Values.resources }}
          {{ toYaml .Values.resources | nindent 10 }}
          {{- end }}
        securityContext:
          {{- if .Values.securityContext }}
          {{ toYaml .Values.securityContext | nindent 10 }}
          {{- end }}
        {{- if or (include "autopilot.hasCustomModels" .) .Values.vertex.applicationCredentialsFile }}
        volumeMounts:
        {{- if (include "autopilot.hasCustomModels" .) }}
        - name: custom-models
          mountPath: /config/models.json
          subPath: models.json
          readOnly: true
        {{- end }}
        {{- if .Values.vertex.applicationCredentialsFile }}
        - name: gcp-credentials
          mountPath: /config/gcp
          readOnly: true
        {{- end }}
        {{- end }}
        env:
        # Core service configuration
        - name: ENABLE_GENAI_HUB
          value: {{ .Values.enableGenaiHub | quote }}
        - name: AUTH_ENABLED
          value: {{ .Values.authEnabled | quote }}
        - name: IS_INTERNAL_DEPLOYMENT
          value: {{ .Values.isInternalDeployment | quote }}
        - name: BLOCK_UNAUTH_REQUESTS
          value: {{ .Values.authEnabled | quote }}
        {{- if .Values.authEnabled }}
        - name: SAX_JWKS_URL
          value: {{ include "autopilot.oauthPublicKeyUrl" . }}
        {{- end }}
        {{- if .Values.modelProviders }}
        - name: MODEL_PROVIDERS
          value: {{ .Values.modelProviders | quote }}
        {{- end }}
        {{- if (include "autopilot.hasCustomModels" .) }}
        - name: LOCAL_MODELS_FILE
          value: "/config/models.json"
        {{- end }}
        # AWS Bedrock
        {{- if .Values.awsRegion }}
        - name: AWS_DEFAULT_REGION
          value: {{ .Values.awsRegion | quote }}
        - name: AWS_REGION
          value: {{ .Values.awsRegion | quote }}
        {{- end }}
        {{- if or .Values.aws.accessKeyId .Values.providerCredentialsSecret }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "autopilot.credentialsSecretName" . }}
              key: AWS_ACCESS_KEY_ID
              optional: true
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "autopilot.credentialsSecretName" . }}
              key: AWS_SECRET_ACCESS_KEY
              optional: true
        {{- if or .Values.aws.sessionToken .Values.providerCredentialsSecret }}
        - name: AWS_SESSION_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ include "autopilot.credentialsSecretName" . }}
              key: AWS_SESSION_TOKEN
              optional: true
        {{- end }}
        {{- end }}
        # Azure OpenAI
        {{- if or .Values.azure.endpoint .Values.providerCredentialsSecret }}
        - name: AZURE_ENDPOINT
          valueFrom:
            secretKeyRef:
              name: {{ include "autopilot.credentialsSecretName" . }}
              key: AZURE_ENDPOINT
              optional: true
        - name: AZURE_OPENAI_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "autopilot.credentialsSecretName" . }}
              key: AZURE_OPENAI_KEY
              optional: true
        {{- if .Values.azure.apiVersion }}
        - name: OPENAI_API_VERSION
          value: {{ .Values.azure.apiVersion | quote }}
        {{- end }}
        {{- end }}
        # Google Vertex AI
        {{- if or .Values.vertex.credentials .Values.vertex.applicationCredentialsFile .Values.providerCredentialsSecret }}
        {{- if .Values.vertex.applicationCredentialsFile }}
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/config/gcp/gcp-sa-key.json"
        {{- else }}
        - name: vertex_auth
          valueFrom:
            secretKeyRef:
              name: {{ include "autopilot.credentialsSecretName" . }}
              key: VERTEX_AUTH
              optional: true
        {{- end }}
        {{- end }}
        {{- if .Values.vertex.project }}
        - name: GOOGLE_CLOUD_PROJECT
          value: {{ .Values.vertex.project | quote }}
        {{- end }}
        {{- if .Values.vertex.location }}
        - name: GOOGLE_CLOUD_LOCATION
          value: {{ .Values.vertex.location | quote }}
        {{- end }}
        livenessProbe:
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          successThreshold: {{ .Values.livenessProbe.successThreshold }}
          failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          httpGet:
            path: /v1/health
            port: {{ .Values.service.targetPort }}
        readinessProbe:
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          successThreshold: {{ .Values.readinessProbe.successThreshold }}
          failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          httpGet:
            path: /v1/health
            port: {{ .Values.service.targetPort }}
{{- include "podAffinity" .Values | indent 6 }}
{{- include "tolerations" .Values | indent 6 }}
{{ end }}
