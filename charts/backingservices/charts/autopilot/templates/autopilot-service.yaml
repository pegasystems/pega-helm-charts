{{- $depName := printf "%s" (include "deploymentName" (dict "root" .Values "defaultname" "autopilot" )) }}
{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $depName }}
  labels:
    app: {{ $depName }}
{{- if and (.Values.service) (.Values.service.annotations) }}
  annotations:
{{ toYaml .Values.service.annotations | indent 4 }}
{{- end }}
spec:
  selector:
    app: {{ $depName }}
  ports:
  - name: http
    protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
  type: {{ .Values.service.serviceType }}
{{ end }}
