{{- $depName := printf "%s" (include "deploymentName" (dict "root" .Values "defaultname" "autopilot" )) }}
{{- if .Values.enabled }}
{{- if not .Values.providerCredentialsSecret }}
{{- if (include "autopilot.hasInlineCredentials" .) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $depName }}-provider-credentials
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- if .Values.azure.endpoint }}
  AZURE_ENDPOINT: {{ .Values.azure.endpoint | b64enc }}
  {{- end }}
  {{- if .Values.azure.apiKey }}
  AZURE_OPENAI_KEY: {{ .Values.azure.apiKey | b64enc }}
  {{- end }}
  {{- if .Values.aws.accessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.aws.accessKeyId | b64enc }}
  {{- end }}
  {{- if .Values.aws.secretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.aws.secretAccessKey | b64enc }}
  {{- end }}
  {{- if .Values.aws.sessionToken }}
  AWS_SESSION_TOKEN: {{ .Values.aws.sessionToken | b64enc }}
  {{- end }}
  {{- if .Values.vertex.credentials }}
  VERTEX_AUTH: {{ .Values.vertex.credentials | b64enc }}
  {{- end }}
  {{- /* Custom OpenAI providers — one API key entry per provider */}}
  {{- if and .Values.customOpenAI.providers (not .Values.customOpenAI.existingSecret) }}
  {{- range .Values.customOpenAI.providers }}
  {{- if .apiKey }}
  {{ printf "CUSTOM_OPENAI_%s_API_KEY" (include "autopilot.creatorEnvSuffix" .creator) }}: {{ .apiKey | b64enc }}
  {{- end }}
  {{- end }}
  {{- end }}
{{- end }}
{{- end }}
{{ end }}
