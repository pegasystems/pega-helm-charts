{{/*
  Idempotent RSA key pair Secret used by the Autopilot service to sign
  JWTs sent to Pega Infinity.

  Behavior:
    - First install: genPrivateKey "rsa" generates a fresh RSA-2048 PEM key.
    - Upgrades: `lookup` finds the existing Secret and reuses its private
      key, so the manifest is byte-identical and Helm sees no diff. The
      key never rotates on a normal upgrade.
    - Uninstall: the Secret is deleted with the rest of the release. A
      subsequent install regenerates a new key (Pega Infinity must
      re-fetch JWKS).
    - When `pegaAuth.existingSecret` is set the chart does NOT manage the
      Secret at all; the operator is responsible for creating and
      maintaining a Secret containing key `AUTOPILOT_PEGA_PRIVATE_KEY_PEM`.

  Only the private key is stored. The Autopilot service derives the
  public key in-process via cryptography.PrivateKey.public_key().
*/}}
{{- if .Values.enabled }}
{{- if not .Values.pegaAuth.existingSecret }}
{{- $secretName := include "autopilot.pegaAuthSecretName" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $privateKeyPEM := "" }}
{{- if and $existing $existing.data (index $existing.data "AUTOPILOT_PEGA_PRIVATE_KEY_PEM") }}
  {{- $privateKeyPEM = index $existing.data "AUTOPILOT_PEGA_PRIVATE_KEY_PEM" | b64dec }}
{{- else }}
  {{- $privateKeyPEM = genPrivateKey "rsa" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  AUTOPILOT_PEGA_PRIVATE_KEY_PEM: {{ $privateKeyPEM | b64enc | quote }}
{{- end }}
{{- end }}
